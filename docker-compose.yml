services:
  mongo:
    image: mongo:7
    container_name: Auto-DeployX-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - Auto-DeployX-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: Auto-DeployX-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGODB_URI=mongodb://mongo:27017/devops-panel
      - FRONTEND_URL=http://localhost
    depends_on:
      - mongo
    networks:
      - Auto-DeployX-network
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - deploy-workdir:/tmp/deploys

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: Auto-DeployX-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - Auto-DeployX-network

networks:
  Auto-DeployX-network:
    driver: bridge

volumes:
  mongo-data:
  deploy-workdir:
